<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkour Game</title>

<style>
body { margin:0; overflow:hidden; background:#111; }

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#2e8b57,#1f5e3c);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#play{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#4aa3ff;
  color:white;
  font-size:30px;
  border:none;
}

/* JOYSTICK */
#joyBase{
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#joyStick{
  position:absolute;
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  top:35px;
  left:35px;
}

/* JUMP */
#jumpBtn{
  position:absolute;
  bottom:40px;
  right:40px;
  width:90px;
  height:90px;
  background:rgba(0,150,255,0.3);
  border:2px solid #00aaff;
  border-radius:50%;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="menu">
  <button id="play">PLAY</button>
</div>

<canvas id="game"></canvas>

<div id="joyBase">
  <div id="joyStick"></div>
</div>

<div id="jumpBtn">JUMP</div>

<script src="game.js"></script>
</body>
</html>
