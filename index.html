<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Parkour</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#111;
}

/* CANVAS */
canvas{
  display:block;
}

/* JOYSTICK */
#joyBase{
  position:absolute;
  bottom:40px;
  left:40px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#joyStick{
  position:absolute;
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  top:35px;
  left:35px;
}

/* JUMP */
#jumpBtn{
  position:absolute;
  bottom:40px;
  right:40px;
  width:90px;
  height:90px;
  background:rgba(0,150,255,0.3);
  border:2px solid #00aaff;
  border-radius:50%;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  user-select:none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="joyBase">
  <div id="joyStick"></div>
</div>

<div id="jumpBtn">JUMP</div>

<script src="game.js"></script>
</body>
</html>
